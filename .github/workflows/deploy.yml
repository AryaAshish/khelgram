name: Deploy

on:
  push:
    branches: [main, dev]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Select Vercel project
        id: project
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "project_id=${{ secrets.VERCEL_PROJECT_ID_PROD }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "project_id=${{ secrets.VERCEL_PROJECT_ID_DEV }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        env:
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}
        run: vercel pull --yes --environment=${{ steps.project.outputs.environment }} --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}
        run: vercel build ${{ steps.project.outputs.prod_flag }} --token=$VERCEL_TOKEN

      - name: Deploy
        env:
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}
        run: vercel deploy --prebuilt ${{ steps.project.outputs.prod_flag }} --token=$VERCEL_TOKEN
